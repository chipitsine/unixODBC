on: [ push, workflow_dispatch ]

permissions:
  contents: read

jobs:
  pg_test:
    strategy:
      matrix:
        cc: [ gcc, clang ]  
      fail-fast: false
    name: ${{ matrix.cc }}
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      mariadb:
        image: mariadb:latest
        env:
          MYSQL_ROOT_PASSWORD: root_password
          MYSQL_DATABASE: test_db
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized" 
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 3306:3306
    steps:
    - uses: actions/checkout@v4
    - name: Install apt dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libltdl-dev odbc-mariadb odbc-postgresql subversion qmake6 qt6-base-dev
    - name: configure
      run: |
        autoreconf -iv
        CC=${{ matrix.cc }} CFLAGS="-ggdb -fsanitize=address" ./configure --prefix=/ --exec-prefix=/
    - name: build
      run: |
        make
        sudo make install

    - name: gtt
      run: |
        git clone https://github.com/mazbrili/unixodbc-gui-qt
        cd unixodbc-gui-qt
        autoreconf -iv
        ./configure || cat config.log
        exit 1
        cd gtrtstQ4
        make
        sudo make install

    - name: ttt
      run: |
       svn checkout https://svn.code.sf.net/p/unixodbc-test/code/ unixodbc-test-code
       cd unixodbc-test-code/AutoTests
       qmake6
       make
        
    - name: mariadb test1
      run: |
        sudo -E ./exe/.libs/odbcinst -i -d -f MariaDB_odbc_driver_template.ini
        ./exe/.libs/odbcinst  -i -s -h -f MariaDB_odbc_data_source_template.ini
        echo 'SELECT VERSION();' | ./exe/.libs/isql -v MariaDB-server -b
        
